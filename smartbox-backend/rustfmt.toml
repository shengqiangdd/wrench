# Rust formatting configuration
max_width = 120
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
fn_call_width = 80
struct_lit_width = 80
enum_discrim_align_threshold = 0
match_arm_blocks = 20
force_multiline_blocks = true
fn_args_layout = "Tall"
merge_derives = true
use_try_shorthand = true
use_field_init_shorthand = true
force_explicit_abi = true
