name: Build amd64 Image

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - '.github/workflows/docker-amd64.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 → latest
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64
          build-args: |
            BUILD_HASH=${{ github.sha }}

      # Fix: buildx wraps single-arch images in a manifest list.
      # Use crane to extract the actual amd64 digest and re-tag it directly.
      - uses: imjasonh/setup-crane@v0.3

      - name: Re-tag amd64 as single-arch manifest
        run: |
          DIGEST=$(crane digest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64" --platform linux/amd64)
          echo "Resolved amd64 digest: $DIGEST"
          crane copy "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64"
          echo "✅ amd64 tag is now a single-arch manifest"
