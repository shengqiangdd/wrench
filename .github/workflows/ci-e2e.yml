name: CI E2E Tests
on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g. "chromium" or "mobile")'
        required: false
        default: ''
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'http://localhost:4173'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start preview server
        run: npx vite preview --host 0.0.0.0 --port 4173 &
        working-directory: frontend

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:4173 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run E2E tests
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            npx playwright test --project="$FILTER"
          else
            npx playwright test --project=chromium
          fi
        working-directory: frontend
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:4173' }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
