name: CI Security & Quality Audit
on:
  push:
    paths:
      - 'frontend/package-lock.json'
      - 'backend/Cargo.lock'
      - '.github/workflows/ci-audit.yml'
  pull_request:
    paths:
      - 'frontend/package-lock.json'
      - 'backend/Cargo.lock'
  schedule:
    # 每周一上午10点运行安全审计
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (critical only)
        run: npm audit --audit-level=critical
        working-directory: frontend

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install and run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit
        working-directory: backend
        continue-on-error: true

  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and measure
        working-directory: frontend
        run: |
          npm run build
          echo "=== Bundle Size Report ==="
          echo ""
          echo "--- JavaScript ---"
          ls -lhS dist/assets/*.js 2>/dev/null | awk '{print $5, $9}'
          echo ""
          echo "--- CSS ---"
          ls -lhS dist/assets/*.css 2>/dev/null | awk '{print $5, $9}'
          echo ""
          echo "--- Total ---"
          du -sh dist/
          echo ""
          echo "--- Gzipped ---"
          ls -lhS dist/assets/*.js.gz 2>/dev/null | awk '{print $5, $9}'
          ls -lhS dist/assets/*.css.gz 2>/dev/null | awk '{print $5, $9}'

      - name: Check size threshold
        working-directory: frontend
        run: |
          TOTAL=$(du -sb dist/ | cut -f1)
          THRESHOLD=10485760  # 10MB
          if [ "$TOTAL" -gt "$THRESHOLD" ]; then
            echo "❌ Bundle size ($TOTAL bytes) exceeds threshold ($THRESHOLD bytes)"
            exit 1
          fi
          echo "✅ Bundle size OK: $(echo "scale=2; $TOTAL/1048576" | bc)MB"
