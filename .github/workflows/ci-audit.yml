name: CI Security & Quality Audit
on:
  push:
    paths:
      - 'frontend/package-lock.json'
      - 'backend/Cargo.lock'
      - '.github/workflows/ci-audit.yml'
  pull_request:
    paths:
      - 'frontend/package-lock.json'
      - 'backend/Cargo.lock'
  schedule:
    # 每周一上午10点运行安全审计
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (critical only)
        run: npm audit --audit-level=critical
        working-directory: frontend

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install cargo-audit (pre-built binary)
        run: |
          curl -sSL https://github.com/rustsec/rustsec/releases/latest/download/cargo-audit-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv cargo-audit /usr/local/bin/

      - name: Run cargo audit
        run: cargo audit
        working-directory: backend
        continue-on-error: true

  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and measure
        run: |
          npm run build
          echo "=== Bundle Size Report ==="
          echo ""
          echo "--- JavaScript ---"
          ls -lhS frontend/dist/assets/*.js 2>/dev/null | awk '{print $5, $9}'
          echo ""
          echo "--- CSS ---"
          ls -lhS frontend/dist/assets/*.css 2>/dev/null | awk '{print $5, $9}'
          echo ""
          echo "--- Total ---"
          du -sh frontend/dist/
          echo ""
          echo "--- Gzipped ---"
          ls -lhS frontend/dist/assets/*.js.gz 2>/dev/null | awk '{print $5, $9}'
          ls -lhS frontend/dist/assets/*.css.gz 2>/dev/null | awk '{print $5, $9}'

      - name: Check size threshold
        run: |
          TOTAL=$(du -sb frontend/dist/ | cut -f1)
          THRESHOLD=10485760  # 10MB
          if [ "$TOTAL" -gt "$THRESHOLD" ]; then
            echo "❌ Bundle size ($TOTAL bytes) exceeds threshold ($THRESHOLD bytes)"
            exit 1
          fi
          echo "✅ Bundle size OK: $(echo "scale=2; $TOTAL/1048576" | bc)MB"
