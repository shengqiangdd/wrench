name: CI Docker Image Size Check
on:
  push:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.nodocker'
      - '.github/workflows/ci-docker-size.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.nodocker'
  workflow_dispatch:

jobs:
  docker-size:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (amd64 only, with cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: wrench:size-check
          platforms: linux/amd64
          cache-from: |
            type=gha,scope=docker-size
            type=registry,ref=ghcr.io/${{ github.repository }}:cache
          cache-to: type=gha,mode=max,scope=docker-size
          build-args: |
            BUILD_HASH=${{ github.sha }}

      - name: Measure image size
        run: |
          echo "=== Docker Image Size Report ==="
          echo ""
          SIZE=$(docker image inspect wrench:size-check --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
          echo "Image size: ${SIZE_MB}MB (${SIZE} bytes)"
          echo ""
          echo "--- Layers ---"
          docker history wrench:size-check --human --format "{{.Size}}\t{{.CreatedBy}}" | head -10
          echo ""
          THRESHOLD=209715200  # 200MB
          if [ "$SIZE" -gt "$THRESHOLD" ]; then
            echo "⚠️  Image size (${SIZE_MB}MB) exceeds recommended threshold (200MB)"
          else
            echo "✅ Image size OK: ${SIZE_MB}MB"
          fi
