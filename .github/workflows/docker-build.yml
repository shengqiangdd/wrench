name: Merge Multi-Arch Manifest

# 手动触发，arm64 构建完成后手动合并
on:
  workflow_dispatch:
    inputs:
      skip_arm64_check:
        description: 'Skip arm64 tag verification (force merge even if arm64 missing)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  merge-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: imjasonh/setup-crane@v0.3

      - name: Verify arm64 tag exists
        if: ${{ github.event.inputs.skip_arm64_check != 'true' }}
        run: |
          echo "Checking if arm64 tag exists..."
          if crane manifest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64" > /dev/null 2>&1; then
            echo "✅ arm64 tag found"
          else
            echo "❌ arm64 tag not found or inaccessible"
            echo "Please build arm64 first via docker-arm64.yml workflow"
            exit 1
          fi

      - name: Merge amd64 + arm64 → latest
        run: |
          echo "Creating multi-arch manifest list..."
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64

          echo "✅ Updated latest to multi-arch"
