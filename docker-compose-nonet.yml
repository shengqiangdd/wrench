services:
  wrench:
    container_name: wrench
    image: ghcr.io/shengqiangdd/wrench:latest
    network_mode: host
    volumes:
      - wrench-data:/data
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: /data/wrench.db
      JWT_SECRET: "${JWT_SECRET:?请设置 JWT_SECRET 环境变量}"
      FRONTEND_DIST: /app/working/workspaces/default/wrench/frontend/dist
      PLUGINS_DIR: /app/working/workspaces/default/wrench/plugins

volumes:
  wrench-data:
